<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wakeless — Lineage 2 Essence | Lilac</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, #1a1638 0%, #0b0b18 45%, #05050d 100%);
      color: #fff;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
    }
    .logo {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 24px;
      display: block;
      margin: 0 auto 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 42px;
      line-height: 1.05;
      color: #ffd76a;
      letter-spacing: 0.5px;
    }
    .game {
      margin: 0 0 8px;
      font-size: 18px;
      color: #f2f2f2;
      opacity: 0.95;
    }
    .server {
      margin: 0 0 28px;
      font-size: 16px;
      color: #d9d9e6;
      opacity: 0.9;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      background: #ffbe33;
      color: #1a1300;
      font-weight: 700;
      font-size: 18px;
      padding: 16px 28px;
      border-radius: 14px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .note {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <main class="card">
    <img
      class="logo"
      src="image.jpeg"
			alt="Логотип клана Wakeless"
    />
    <h1>Wakeless</h1>
    <p class="game">Lineage 2 Essence</p>
    <p class="server">Сервер: <strong>Lilac</strong></p>
    <a class="btn" href="https://t.me/+Oh7iCCJyhQMxODMy" target="_blank">
      Вступить в tg группу
    </a>
  </main>
</body>
</html>
